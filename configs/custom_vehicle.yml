MODEL:
  DEVICE: "cuda"
  NAME: 'feature_transformer'  # CHANGED: More descriptive name
  FEATURE_DIM: 256
  LAST_STRIDE: 1  # Not used for feature input, but keep for compatibility
  PRETRAIN_PATH: ''
  PRETRAIN_CHOICE: 'imagenet'  # Not used for feature input
  NECK: 'bnneck'
  IF_WITH_CENTER: 'no'
  ID_LOSS_TYPE: 'softmax'
  ID_LOSS_WEIGHT: 1.0                                                     
  TRIPLET_LOSS_WEIGHT: 1.0
  METRIC_LOSS_TYPE: 'triplet'
  DIST_TRAIN: False
  NO_MARGIN: False
  IF_LABELSMOOTH: 'on'
  COS_LAYER: False
  
  # Transformer settings (simplified for feature input)
  DROP_PATH: 0.1
  DROP_OUT: 0.1  # INCREASED: More dropout for feature input
  ATT_DROP_RATE: 0.0
  TRANSFORMER_TYPE: 'None'
  STRIDE_SIZE: [16, 16]  # Not used for feature input
  
  # SIE settings (KEEP THESE!)
  SIE_COE: 3.0
  SIE_CAMERA: True   # Important for cross-camera ReID
  SIE_VIEW: False    # Disable view-aware features
  
  # FIXED: Feature-specific settings
  FEATURE_DIM: 256  # R-CNN feature dimension

# FIXED: Remove image-specific parameters completely
INPUT:
  FEATURE_NORM: True  # Normalize input features

# FIXED: Point to correct directory structure
DATASETS:
  NAMES: 'CustomVehicleDataset'
  ROOT_DIR: './data/processed'  # Point to processed features

DATALOADER:
  NUM_WORKERS: 4
  SAMPLER: 'softmax_triplet'  # Keep triplet sampling
  NUM_INSTANCE: 4

SOLVER:
  OPTIMIZER_NAME: "Adam"
  MAX_EPOCHS: 200     # INCREASED: May need more epochs with features
  BASE_LR: 1e-4       # REDUCED: Lower LR for feature input
  LARGE_FC_LR: False
  BIAS_LR_FACTOR: 1
  SEED: 1234
  MOMENTUM: 0.9
  MARGIN: 0.3
  CENTER_LR: 0.5
  CENTER_LOSS_WEIGHT: 0.0005
  WEIGHT_DECAY: 0.0005
  WEIGHT_DECAY_BIAS: 0.0005
  GAMMA: 0.1
  STEPS: [40, 80]     # Adjusted for longer training
  WARMUP_FACTOR: 0.01
  WARMUP_EPOCHS: 10   # INCREASED: Longer warmup
  WARMUP_METHOD: "linear"
  COSINE_MARGIN: 0.5
  COSINE_SCALE: 30
  CHECKPOINT_PERIOD: 20  # INCREASED: Less frequent checkpoints
  LOG_PERIOD: 50
  EVAL_PERIOD: 20     # INCREASED: Less frequent evaluation
  IMS_PER_BATCH: 128  # INCREASED: Larger batches with features

TEST:
  IMS_PER_BATCH: 256  # INCREASED: Much faster inference
  RE_RANKING: False
  WEIGHT: ""
  NECK_FEAT: 'after'
  FEAT_NORM: 'yes'
  EVAL: False

OUTPUT_DIR: "./logs/custom_vehicle_reid_features"