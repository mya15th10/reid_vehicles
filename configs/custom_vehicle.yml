MODEL:
  DEVICE: "cuda"
  NAME: 'cnn_transformer'  # Keep same name, but model will be feature-based
  LAST_STRIDE: 1  # Not used for feature input, but keep for compatibility
  PRETRAIN_PATH: ''
  PRETRAIN_CHOICE: 'imagenet'  # Not used for feature input
  NECK: 'bnneck'
  IF_WITH_CENTER: 'no'
  ID_LOSS_TYPE: 'softmax'
  ID_LOSS_WEIGHT: 1.0
  TRIPLET_LOSS_WEIGHT: 1.0
  METRIC_LOSS_TYPE: 'triplet'
  DIST_TRAIN: False
  NO_MARGIN: False
  IF_LABELSMOOTH: 'on'
  COS_LAYER: False
  
  # Transformer settings
  DROP_PATH: 0.1
  DROP_OUT: 0.0
  ATT_DROP_RATE: 0.0
  TRANSFORMER_TYPE: 'None'
  STRIDE_SIZE: [16, 16]  # Not used for feature input
  
  # SIE settings (for multi-camera) - KEEP THESE!
  SIE_COE: 3.0
  SIE_CAMERA: True   # Important for cross-camera ReID
  SIE_VIEW: False    # Disable view-aware features
  
  # NEW: Feature-specific settings
  FEATURE_DIM: 2048  # R-CNN feature dimension

# UPDATED: Remove image-specific parameters
INPUT:
  # Remove image size parameters (not needed for features)
  # SIZE_TRAIN: [384, 128]  # REMOVE
  # SIZE_TEST: [384, 128]   # REMOVE
  # PROB: 0.5               # REMOVE
  # RE_PROB: 0.5            # REMOVE
  # PIXEL_MEAN: [0.485, 0.456, 0.406]  # REMOVE
  # PIXEL_STD: [0.229, 0.224, 0.225]   # REMOVE
  # PADDING: 10             # REMOVE
  
  # NEW: Feature normalization (optional)
  FEATURE_NORM: True  # Normalize input features

# UPDATED: Point to processed features directory
DATASETS:
  NAMES: 'CustomVehicleDataset'
  ROOT_DIR: './data/processed'  # CHANGED: Point to features directory

DATALOADER:
  NUM_WORKERS: 4     # Can increase since no image processing
  SAMPLER: 'softmax_triplet'  # Keep triplet sampling
  NUM_INSTANCE: 4    # 4 instances per identity in each batch

SOLVER:
  OPTIMIZER_NAME: "Adam"
  MAX_EPOCHS: 60     # May need fewer epochs with features
  BASE_LR: 3e-4      # May need to adjust for feature input
  LARGE_FC_LR: False
  BIAS_LR_FACTOR: 1
  SEED: 1234
  MOMENTUM: 0.9
  MARGIN: 0.3
  CENTER_LR: 0.5
  CENTER_LOSS_WEIGHT: 0.0005
  WEIGHT_DECAY: 0.0005
  WEIGHT_DECAY_BIAS: 0.0005
  GAMMA: 0.1
  STEPS: [30, 50]    # Learning rate decay steps
  WARMUP_FACTOR: 0.01
  WARMUP_EPOCHS: 5
  WARMUP_METHOD: "linear"
  COSINE_MARGIN: 0.5
  COSINE_SCALE: 30
  CHECKPOINT_PERIOD: 10
  LOG_PERIOD: 50     # More frequent logging
  EVAL_PERIOD: 10
  IMS_PER_BATCH: 64  # INCREASED: Can handle larger batches with features

TEST:
  IMS_PER_BATCH: 128  # INCREASED: Faster inference with features
  RE_RANKING: False
  WEIGHT: ""
  NECK_FEAT: 'after'
  FEAT_NORM: 'yes'
  EVAL: False

OUTPUT_DIR: "./logs/custom_vehicle_reid_features"  # CHANGED: Different output dir