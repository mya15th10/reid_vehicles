MODEL:
  DEVICE: "cuda"
  NAME: 'feature_transformer'
  FEATURE_DIM: 256  # Match your FPN feature dimension
  LAST_STRIDE: 1
  PRETRAIN_PATH: ''
  PRETRAIN_CHOICE: 'imagenet'
  NECK: 'bnneck'
  IF_WITH_CENTER: 'no'
  ID_LOSS_TYPE: 'softmax'
  ID_LOSS_WEIGHT: 1.0                                                     
  TRIPLET_LOSS_WEIGHT: 1.0
  METRIC_LOSS_TYPE: 'triplet'
  DIST_TRAIN: False
  NO_MARGIN: False
  IF_LABELSMOOTH: 'on'
  COS_LAYER: False
  
  # Optimized for 256-dim features
  DROP_PATH: 0.1
  DROP_OUT: 0.0
  ATT_DROP_RATE: 0.0
  TRANSFORMER_TYPE: 'None'
  STRIDE_SIZE: [16, 16]
  
  # SIE settings - KEEP THESE!
  SIE_COE: 3.0
  SIE_CAMERA: True   # Important for cross-camera ReID
  SIE_VIEW: False

INPUT:
  FEATURE_NORM: True

DATASETS:
  NAMES: 'CustomVehicleDataset'
  ROOT_DIR: './data/processed'

DATALOADER:
  NUM_WORKERS: 4
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4

SOLVER:
  OPTIMIZER_NAME: "Adam"
  MAX_EPOCHS: 100
  BASE_LR: 3e-4       # Good starting point for 256-dim features
  LARGE_FC_LR: False
  BIAS_LR_FACTOR: 1
  SEED: 1234
  MOMENTUM: 0.9
  MARGIN: 0.3
  CENTER_LR: 0.5
  CENTER_LOSS_WEIGHT: 0.0005
  WEIGHT_DECAY: 0.0005
  WEIGHT_DECAY_BIAS: 0.0005
  GAMMA: 0.1
  STEPS: [40, 70]
  WARMUP_FACTOR: 0.01
  WARMUP_EPOCHS: 10
  WARMUP_METHOD: "linear"
  COSINE_MARGIN: 0.5
  COSINE_SCALE: 30
  CHECKPOINT_PERIOD: 20
  LOG_PERIOD: 50
  EVAL_PERIOD: 20
  IMS_PER_BATCH: 64

TEST:
  IMS_PER_BATCH: 128
  RE_RANKING: False
  WEIGHT: ""
  NECK_FEAT: 'after'
  FEAT_NORM: 'yes'
  EVAL: False

OUTPUT_DIR: "./logs/custom_vehicle_reid_features"